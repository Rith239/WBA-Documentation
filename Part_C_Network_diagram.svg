<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Network Diagram: Device to Internet</title>
  <desc>A diagram showing how the device (192.0.2.2) connects through the router/gateway (192.0.2.1) to the ISP, then through DNS resolution to the internet and Google servers.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ─── INTERNET (top) ─── -->
  <rect x="230" y="30" width="220" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Internet</text>
  <text x="340" y="76" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">Public network</text>

  <!-- arrow: Internet → ISP -->
  <line x1="340" y1="94" x2="340" y2="148" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- ─── ISP Node ─── -->
  <rect x="230" y="150" width="220" height="64" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="176" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A">ISP</text>
  <text x="340" y="196" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3B6D11">Internet Service Provider</text>

  <!-- arrow: ISP → Router -->
  <line x1="340" y1="214" x2="340" y2="268" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- ─── Router/Gateway ─── -->
  <rect x="200" y="270" width="280" height="76" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="298" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">Router / Default Gateway</text>
  <text x="340" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">IP: 192.0.2.1</text>
  <text x="340" y="336" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#854F0B">Assigns private IPs via DHCP</text>

  <!-- arrow: Router → Device -->
  <line x1="340" y1="346" x2="340" y2="400" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── Your Device ─── -->
  <rect x="180" y="402" width="320" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="430" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Your Device (vm)</text>
  <text x="340" y="450" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Private IP: 192.0.2.2</text>
  <text x="340" y="468" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">MAC: 02:fc:00:00:00:05 | Interface: eth0</text>
  <text x="340" y="486" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7F77DD">DNS Server: 8.8.8.8 (Google)</text>

  <!-- ─── DNS side box ─── -->
  <rect x="490" y="150" width="160" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="570" y="176" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">DNS Server</text>
  <text x="570" y="196" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">8.8.8.8 (Google)</text>

  <!-- DNS dashed arrow from device -->
  <path d="M500 445 L570 445 L570 214" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="595" y="445" font-family="sans-serif" font-size="11" fill="#0F6E56">DNS Query</text>
  <text x="595" y="460" font-family="sans-serif" font-size="11" fill="#0F6E56">(e.g. google.com)</text>

  <!-- ─── Legend ─── -->
  <rect x="30" y="520" width="620" height="60" rx="8" fill="none" stroke="#73726c" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="340" y="542" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#3d3d3a">How it works:</text>
  <text x="340" y="562" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">Your device sends data → Router (Gateway) forwards it → ISP routes it → Reaches the Internet</text>
</svg>
